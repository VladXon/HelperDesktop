<!DOCTYPE html><html class="dark" lang="ru" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Настройки - HelperDesktop</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#ffdcbb",
                        "on-secondary-fixed": "#1e0e4e",
                        "surface-variant": "#353437",
                        "on-tertiary-fixed": "#2c1700",
                        "tertiary-fixed-dim": "#ffb869",
                        "on-secondary": "#332664",
                        "outline": "#958ea0",
                        "surface-tint": "#d0bcff",
                        "surface": "#131315",
                        "surface-bright": "#39393b",
                        "on-tertiary": "#482900",
                        "on-secondary-fixed-variant": "#4a3d7c",
                        "on-primary-fixed-variant": "#5516be",
                        "inverse-on-surface": "#313032",
                        "on-tertiary-container": "#3f2300",
                        "on-surface": "#e5e1e4",
                        "on-error": "#690005",
                        "background": "#131315",
                        "on-primary": "#3c0091",
                        "tertiary-container": "#ca801e",
                        "primary-container": "#a078ff",
                        "primary": "#d0bcff",
                        "on-surface-variant": "#cbc3d7",
                        "secondary-fixed": "#e7deff",
                        "surface-container-highest": "#353437",
                        "inverse-primary": "#6d3bd7",
                        "outline-variant": "#494454",
                        "surface-container": "#201f21",
                        "surface-container-low": "#1c1b1d",
                        "on-secondary-container": "#baabf3",
                        "on-background": "#e5e1e4",
                        "surface-container-high": "#2a2a2c",
                        "inverse-surface": "#e5e1e4",
                        "error-container": "#93000a",
                        "secondary": "#ccbeff",
                        "surface-container-lowest": "#0e0e10",
                        "on-primary-fixed": "#23005c",
                        "surface-dim": "#131315",
                        "error": "#ffb4ab",
                        "secondary-container": "#4a3d7c",
                        "on-primary-container": "#340080",
                        "primary-fixed-dim": "#d0bcff",
                        "primary-fixed": "#e9ddff",
                        "secondary-fixed-dim": "#ccbeff",
                        "on-tertiary-fixed-variant": "#673d00",
                        "tertiary": "#ffb869",
                        "on-error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container_padding": "32px",
                        "sidebar_width": "240px",
                        "gutter": "16px",
                        "stack_gap": "24px",
                        "item_gap": "8px"
                    },
                    "fontFamily": {
                        "mono-label": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "mono-label": ["11px", { "lineHeight": "12px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400" }],
                        "headline-lg": ["28px", { "lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .glass-panel {
            background: rgba(20, 20, 22, 0.4);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05), 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .glass-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }
        .glass-input:focus {
            border-color: #8b5cf6;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.3), 0 0 8px rgba(139, 92, 246, 0.3);
            outline: none;
        }
        .primary-btn {
            background-color: #8b5cf6;
            color: #ffffff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
        }
        .primary-btn:hover {
            background-color: #7c3aed;
        }
        .ghost-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }
        .ghost-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col font-body-md bg-background text-on-background relative antialiased">
<!-- Atmospheric Orbs -->
<div class="absolute inset-0 pointer-events-none overflow-hidden z-0">
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] rounded-full bg-primary/20 blur-[100px]"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[30%] h-[30%] rounded-full bg-secondary/10 blur-[100px]"></div>
</div>
<!-- TopNavBar -->
<header class="bg-surface/50 backdrop-blur-xl docked full-width top-0 h-14 border-b border-white/5 flex justify-between items-center w-full px-4 z-50 relative">
<div class="flex items-center gap-4">
<span class="font-headline-md text-headline-md font-bold text-on-surface">HelperDesktop</span>
<div class="relative flex items-center ml-4">
<span class="material-symbols-outlined absolute left-3 text-on-surface-variant text-sm">search</span>
<input class="glass-input text-label-sm text-on-surface pl-9 pr-12 py-1.5 rounded-md w-64 placeholder-on-surface-variant/40 focus:outline-none bg-surface-container-low/50" placeholder="Поиск команд..." type="text">
<span class="absolute right-3 text-[10px] text-on-surface-variant font-mono border border-white/10 px-1 rounded bg-black/20">Ctrl K</span>
</div>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center gap-1.5 text-emerald-400 font-label-sm text-label-sm">
<span class="material-symbols-outlined text-[14px]">check_circle</span>
<span class="">Сервер доступен</span>
</div>
<div class="h-4 w-px bg-white/10 mx-2"></div>
<div class="flex items-center gap-2 cursor-pointer hover:bg-white/5 transition-colors p-1 rounded">
<span class="material-symbols-outlined text-on-surface-variant">person</span>
<span class="text-label-sm text-on-surface">Ined</span>
<span class="material-symbols-outlined text-on-surface-variant text-sm">expand_more</span>
</div>
<div class="flex items-center gap-2 ml-4">
<button class="hover:bg-white/5 transition-colors p-1 rounded text-on-surface-variant"><span class="material-symbols-outlined">minimize</span></button>
<button class="hover:bg-white/5 transition-colors p-1 rounded text-on-surface-variant"><span class="material-symbols-outlined">fullscreen_exit</span></button>
<button class="hover:bg-white/5 transition-colors p-1 rounded text-on-surface-variant"><span class="material-symbols-outlined">close</span></button>
</div>
</div>
</header>
<div class="flex flex-1 overflow-hidden relative z-10">
<!-- SideNavBar -->
<nav class="bg-surface-container-lowest/30 backdrop-blur-3xl docked fixed left-0 top-14 h-[calc(100vh-3.5rem)] w-60 border-r border-white/5 flex flex-col py-4 z-40">
<div class="flex-1 overflow-y-auto">
<ul class="space-y-1"><li class=""><a class="flex items-center gap-3 text-on-surface-variant py-3 px-4 hover:text-on-surface hover:bg-white/5 transition-all" href="#"><span class="material-symbols-outlined">sticky_note_2</span><span class="font-label-sm text-label-sm">Заметки</span></a></li><li class=""><a class="flex items-center gap-3 text-on-surface-variant py-3 px-4 hover:text-on-surface hover:bg-white/5 transition-all" href="#"><span class="material-symbols-outlined">layers</span><span class="font-label-sm text-label-sm">Пресеты</span></a></li><li class=""><a class="flex items-center gap-3 bg-white/5 text-on-surface border-l-2 border-primary py-3 px-4 transition-all translate-x-1 duration-200" href="#"><span class="material-symbols-outlined text-primary">settings</span><span class="font-label-sm text-label-sm text-primary font-bold">Настройки</span></a></li></ul>
</div>

</nav>
<!-- Main Canvas -->
<main class="flex-1 ml-60 overflow-y-auto p-container_padding h-[calc(100vh-3.5rem)]">
<div class="mx-auto space-y-stack_gap max-w-4xl"><h1 class="font-headline-lg text-headline-lg font-bold text-on-surface mb-8 tracking-tight">Настройки</h1>
<!-- Account Section -->
<section class="glass-panel rounded-2xl overflow-hidden relative">
<!-- Inner edge highlight -->
<div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
<div class="p-8 sm:p-10 cursor-pointer flex justify-between items-center border-b border-white/5 hover:bg-white/5 transition-colors">
<h2 class="text-headline-md font-bold text-on-surface font-headline-md">Аккаунт</h2>
<span class="material-symbols-outlined text-on-surface-variant">expand_less</span>
</div>
<div class="p-8 sm:p-10 space-y-6">
<div class="grid grid-cols-2 gap-gutter">
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-on-surface">Логин</label>
<input class="w-full glass-input rounded-lg px-4 py-3 font-body-md text-on-surface placeholder:text-on-surface-variant/40 bg-surface-container-low/50" type="text" value="Ined">
</div>
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-on-surface">Email</label>
<input class="w-full glass-input rounded-lg px-4 py-3 font-body-md text-on-surface placeholder:text-on-surface-variant/40 bg-surface-container-low/50" placeholder="" type="email">
</div>
</div>
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-on-surface">Отображаемое имя</label>
<input class="w-full glass-input rounded-lg px-4 py-3 font-body-md text-on-surface placeholder:text-on-surface-variant/40 bg-surface-container-low/50" placeholder="" type="text">
</div>
<div class="flex gap-4 pt-2">
<button class="ghost-btn px-5 py-3 rounded-lg font-label-sm text-label-sm text-on-surface">Сменить пароль</button>
<button class="ghost-btn px-5 py-3 rounded-lg font-label-sm text-label-sm text-on-surface">Сменить email</button>
</div>
</div>
</section>
<!-- Telegram Section -->
<section class="glass-panel rounded-2xl overflow-hidden relative">
<!-- Inner edge highlight -->
<div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
<div class="p-8 sm:p-10 cursor-pointer flex justify-between items-center hover:bg-white/5 transition-colors">
<h2 class="text-headline-md font-bold text-on-surface font-headline-md">Telegram</h2>
<span class="material-symbols-outlined text-on-surface-variant">expand_less</span>
</div>
<div class="p-8 sm:p-10 pt-0 sm:pt-0 space-y-6">
<p class="font-body-md text-body-md text-on-surface-variant">Telegram не привязан</p>
<button class="w-full font-label-sm text-label-sm py-3.5 px-4 rounded-lg flex items-center justify-center relative overflow-hidden group bg-primary">Привязать</button>
</div>
</section></div>
</main>
</div>


</body></html>
