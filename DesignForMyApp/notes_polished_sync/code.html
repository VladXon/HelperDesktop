<!DOCTYPE html><html class="dark" lang="ru"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>HelperDesktop - Заметки</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#ffdcbb",
                        "on-secondary-fixed": "#1e0e4e",
                        "surface-variant": "#353437",
                        "on-tertiary-fixed": "#2c1700",
                        "tertiary-fixed-dim": "#ffb869",
                        "on-secondary": "#332664",
                        "outline": "#958ea0",
                        "surface-tint": "#d0bcff",
                        "surface": "#131315",
                        "surface-bright": "#39393b",
                        "on-tertiary": "#482900",
                        "on-secondary-fixed-variant": "#4a3d7c",
                        "on-primary-fixed-variant": "#5516be",
                        "inverse-on-surface": "#313032",
                        "on-tertiary-container": "#3f2300",
                        "on-surface": "#e5e1e4",
                        "on-error": "#690005",
                        "background": "#131315",
                        "on-primary": "#3c0091",
                        "tertiary-container": "#ca801e",
                        "primary-container": "#a078ff",
                        "primary": "#d0bcff",
                        "on-surface-variant": "#cbc3d7",
                        "secondary-fixed": "#e7deff",
                        "surface-container-highest": "#353437",
                        "inverse-primary": "#6d3bd7",
                        "outline-variant": "#494454",
                        "surface-container": "#201f21",
                        "surface-container-low": "#1c1b1d",
                        "on-secondary-container": "#baabf3",
                        "on-background": "#e5e1e4",
                        "surface-container-high": "#2a2a2c",
                        "inverse-surface": "#e5e1e4",
                        "error-container": "#93000a",
                        "secondary": "#ccbeff",
                        "surface-container-lowest": "#0e0e10",
                        "on-primary-fixed": "#23005c",
                        "surface-dim": "#131315",
                        "error": "#ffb4ab",
                        "secondary-container": "#4a3d7c",
                        "on-primary-container": "#340080",
                        "primary-fixed-dim": "#d0bcff",
                        "primary-fixed": "#e9ddff",
                        "secondary-fixed-dim": "#ccbeff",
                        "on-tertiary-fixed-variant": "#673d00",
                        "tertiary": "#ffb869",
                        "on-error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container_padding": "32px",
                        "sidebar_width": "240px",
                        "gutter": "16px",
                        "stack_gap": "24px",
                        "item_gap": "8px"
                    },
                    "fontFamily": {
                        "mono-label": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "mono-label": ["11px", { "lineHeight": "12px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400" }],

                    }
                }
            }
        }

<style>
        .glass-panel {
            background: rgba(20, 20, 22, 0.4);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05), 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .glass-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }
        .glass-input:focus-within {
            border-color: #8b5cf6;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.3), 0 0 8px rgba(139, 92, 246, 0.3);
        }
        .primary-btn {
            background-color: #8b5cf6;
            color: #ffffff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
        }
        .primary-btn:hover {
            background-color: #7c3aed;
        }
        
        .nav-light-pipe {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 60%;
            width: 2px;
            background-color: #8b5cf6;
            box-shadow: 0 0 8px rgba(139, 92, 246, 0.5);
            border-radius: 0 4px 4px 0;
        }
        
        /* Utility for 1px line */
        .glass-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-background text-on-background h-screen overflow-hidden flex flex-col antialiased font-body-md selection:bg-primary/30">
<!-- TopNavBar -->
<header class="bg-surface/80 backdrop-blur-xl dark:bg-surface/80 flex justify-between items-center w-full px-4 z-50 docked full-width top-0 h-14 border-b border-white/10 flat no shadows flex-shrink-0">
<div class="flex items-center gap-6">
<span class="font-headline-md text-headline-md font-bold text-on-surface">HelperDesktop</span>
<div class="hidden md:flex items-center">
<div class="glass-input rounded-md flex items-center h-8 px-3 w-64 group">
<span class="material-symbols-outlined text-[16px] text-on-surface-variant mr-2 group-focus-within:text-primary transition-colors">search</span>
<input class="bg-transparent border-none outline-none text-label-sm w-full text-on-surface placeholder-on-surface-variant/50 p-0 focus:ring-0" placeholder="Поиск команд..." type="text">
<div class="flex items-center gap-1 opacity-50 bg-white/5 px-1.5 py-0.5 rounded text-[10px] font-mono border border-white/10 ml-2">
<span class="">Ctrl</span><span class="">K</span>
</div>
</div>
</div>
</div>
<div class="flex items-center gap-4 text-on-surface-variant">
<div class="flex items-center gap-1.5 text-[12px] font-medium text-emerald-400 bg-emerald-400/10 px-2 py-1 rounded-full border border-emerald-400/20">
<span class="material-symbols-outlined text-[14px]">check_circle</span>
<span class="">Сервер доступен</span>
</div>
<div class="glass-divider w-px h-5 mx-1"></div>
<button class="flex items-center gap-2 hover:text-on-surface transition-colors group">
<span class="material-symbols-outlined text-[18px]">person</span>
<span class="font-label-sm text-label-sm">Ined</span>
<span class="material-symbols-outlined text-[16px] group-hover:translate-y-px transition-transform">expand_more</span>
</button>
<div class="flex items-center gap-3 ml-4">
<button class="hover:text-on-surface hover:bg-white/5 p-1 rounded transition-colors"><span class="material-symbols-outlined text-[18px]">minimize</span></button>
<button class="hover:text-on-surface hover:bg-white/5 p-1 rounded transition-colors"><span class="material-symbols-outlined text-[18px]">fullscreen_exit</span></button>
<button class="hover:text-error hover:bg-error/10 p-1 rounded transition-colors"><span class="material-symbols-outlined text-[18px]">close</span></button>
</div>
</div>
</header>
<div class="flex flex-1 overflow-hidden h-[calc(100vh-3.5rem)] relative">
<!-- Atmospheric Orbs -->
<div class="absolute inset-0 z-0 opacity-20 mix-blend-screen pointer-events-none"><div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/20 blur-[100px] mix-blend-soft-light"></div>
<div class="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] rounded-full bg-primary-container/10 blur-[120px]"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] rounded-full bg-secondary-container/10 blur-[120px]"></div>
</div>
<!-- SideNavBar -->
<nav class="bg-surface-container/60 backdrop-blur-2xl dark:bg-surface-container/60 flex flex-col h-full py-4 docked left-0 top-14 h-[calc(100vh-3.5rem)] w-60 border-r border-white/10 flat no shadows z-40 flex-shrink-0">
<div class="flex-1 px-3 space-y-1 mt-4">
<!-- Active Item: Заметки -->
<button class="w-full flex items-center gap-3 bg-white/5 text-on-surface border-l-2 border-primary py-3 px-4 rounded-r-lg relative overflow-hidden group">
<div class="nav-light-pipe"></div>
<span class="material-symbols-outlined text-[20px] text-primary">sticky_note_2</span>
<span class="font-label-sm text-label-sm font-medium tracking-wide">Заметки</span>
</button>
<button class="w-full flex items-center gap-3 text-on-surface-variant py-3 px-4 hover:text-on-surface hover:bg-white/5 transition-all rounded-lg group">
<span class="material-symbols-outlined text-[20px] group-hover:text-primary/70 transition-colors">layers</span>
<span class="font-label-sm text-label-sm font-medium tracking-wide">Пресеты</span>
</button>
<button class="w-full flex items-center gap-3 text-on-surface-variant py-3 px-4 hover:text-on-surface hover:bg-white/5 transition-all rounded-lg group">
<span class="material-symbols-outlined text-[20px] group-hover:text-primary/70 transition-colors">settings</span>
<span class="font-label-sm text-label-sm font-medium tracking-wide">Настройки</span>
</button>
</div>
<!-- Footer Area inside Nav -->
<div class="mt-auto px-4 pb-2">
<div class="glass-divider mb-4"></div>
<div class="flex items-center gap-2 text-on-surface-variant opacity-70">
<span class="material-symbols-outlined text-[16px] text-emerald-500">check_circle</span>
<span class="font-mono-label text-mono-label">Сервер доступен</span>
</div>
</div>
</nav>
<!-- Main Canvas -->
<main class="flex-1 flex flex-col relative z-10 w-full overflow-hidden">
<!-- Contextual Utility Header for Note Search & Actions -->
<div class="h-16 px-6 flex items-center justify-between border-b border-white/5 bg-transparent backdrop-blur-sm z-20 sticky top-0">
<div class="flex-1 max-w-2xl">
<div class="glass-input rounded-lg flex items-center h-10 px-4 w-full group bg-white/5">
<span class="material-symbols-outlined text-[20px] text-on-surface-variant mr-3 group-focus-within:text-primary transition-colors">search</span>
<input class="bg-transparent border-none outline-none font-body-md text-body-md w-full text-on-surface placeholder-on-surface-variant/40 p-0 focus:ring-0" placeholder="Поиск по заметкам..." type="text">
</div>
</div>
<button class="primary-btn flex items-center gap-2 px-4 py-2 rounded-lg font-label-sm text-label-sm font-medium ml-4 active:scale-95 shadow-[0_0_20px_rgba(139,92,246,0.3)]">
<span class="material-symbols-outlined text-[18px]">add</span>
<span class="">Новая заметка</span>
</button>
</div>
<!-- Content Area - Empty State -->
<div class="flex-1 overflow-y-auto p-6 md:p-8 flex items-center justify-center relative">
<!-- Center Glass Empty State -->
<div class="glass-panel rounded-2xl p-12 flex flex-col items-center justify-center text-center max-w-md w-full relative overflow-hidden group bg-white/5">
<!-- Inner edge highlight -->
<div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
<!-- Subtle ambient glow behind icon -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-32 bg-primary/10 rounded-full blur-2xl opacity-50 group-hover:opacity-100 transition-opacity duration-700"></div>
<span class="material-symbols-outlined text-6xl text-primary/40 mb-6 font-light">edit_note</span>
<p class="font-body-md text-body-md text-on-surface-variant opacity-70">Нет заметок. Создайте первую.</p>
</div>
</div>
</main>
</div>


</body></html>
