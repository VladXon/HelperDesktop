<!DOCTYPE html><html class="dark" lang="ru"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>HelperDesktop - Вход</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "secondary-fixed": "#e7deff",

                        "secondary-fixed-dim": "#ccbeff",

                    },
                    "fontFamily": {

<style>
        .glass-panel {
            background: rgba(20, 20, 22, 0.4);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05), 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .glass-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }
        .glass-input:focus {
            border-color: #8b5cf6;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.3), 0 0 8px rgba(139, 92, 246, 0.3);
            outline: none;
        }
        .primary-btn {
            background-color: #8b5cf6;
            color: #ffffff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
        }
        .primary-btn:hover {
            background-color: #7c3aed;
        }
        .ghost-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }
        .ghost-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex antialiased font-body-md relative overflow-hidden">
<!-- Atmospheric Orbs -->
<div class="absolute inset-0 pointer-events-none overflow-hidden z-0">
<div class="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] rounded-full bg-primary-container/10 blur-[120px]"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] rounded-full bg-secondary-container/10 blur-[120px]"></div>
</div>
<div class="relative z-10 flex flex-col md:flex-row w-full min-h-screen">
<!-- Left Side: Branding -->
<div class="flex-1 flex flex-col justify-between p-8 md:p-16 lg:p-24 border-b md:border-b-0 md:border-r border-white/5 bg-surface-container-lowest/30 backdrop-blur-3xl">
<div class="mt-8 md:mt-0 flex-grow">
<h1 class="font-headline-lg text-headline-lg font-bold text-on-surface mb-3 tracking-tight">HelperDesktop</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-sm leading-relaxed">
                    Личный помощник: заметки, пресеты, Telegram
                </p>
</div>
<div class="md:mt-auto">
<span class="font-mono-label text-mono-label text-outline-variant">v0.1.0</span>
</div>
</div>
<!-- Right Side: Login Form -->
<div class="flex-1 flex items-center justify-center p-8 md:p-16 bg-surface/50">
<div class="w-full max-w-[440px] glass-panel rounded-2xl p-8 sm:p-10 relative overflow-hidden backdrop-blur-3xl">
<!-- Inner edge highlight -->
<div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
<div class="mb-8">
<h2 class="font-headline-lg text-headline-lg font-bold text-on-surface mb-2">Вход</h2>
<p class="font-body-md text-body-md text-on-surface-variant">
                        Введите логин и пароль или используйте Telegram
                    </p>
</div>
<form class="space-y-6">
<!-- Login Field -->
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-on-surface">Логин</label>
<input class="w-full glass-input rounded-lg px-4 py-3 font-body-md text-on-surface placeholder:text-on-surface-variant/40 bg-surface-container-low/50" placeholder="my-login" type="text">
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-on-surface">Пароль</label>
<input class="w-full glass-input rounded-lg px-4 py-3 font-body-md text-on-surface placeholder:text-on-surface-variant/40 tracking-[0.2em] bg-surface-container-low/50" placeholder="••••••••" type="password">
</div>
<!-- Submit Button -->
<div class="pt-2">
<button class="w-full primary-btn font-label-sm text-label-sm py-3.5 px-4 rounded-lg flex items-center justify-center relative overflow-hidden group" type="button">
<span class="relative z-10 font-medium">Войти</span>
</button>
</div>
<!-- Helper Text -->
<p class="font-body-md text-[13px] leading-tight text-on-surface-variant/70 text-center">
                        Если аккаунт не существует, он будет создан автоматически.
                    </p>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-white/5"></div>
<span class="flex-shrink-0 mx-4 font-mono-label text-mono-label text-outline uppercase tracking-wider">или</span>
<div class="flex-grow border-t border-white/5"></div>
</div>
<!-- Telegram Login Button -->
<button class="w-full ghost-btn text-on-surface font-label-sm text-label-sm py-3 px-4 rounded-lg flex items-center justify-center gap-3 group" type="button">
<span class="material-symbols-outlined text-[20px] text-on-surface-variant group-hover:text-primary transition-colors" data-icon="send">send</span>
<span class="">Войти через Telegram</span>
</button>
</form>
</div>
</div>
</div>


</body></html>
